# lhtask.conf — the single config for the LHTask autonomous TODO workflow.
# Sourced by the git-hook chain (plain shell, no jq needed). Edit freely; the
# bootstrap autodetects sensible defaults for your project type.

# Directories whose changes trigger the REVIEW stage (space-separated, regex-safe).
LHTASK_REVIEW_DIRS="src tests"

# Test command the IMPLEMENT stage must run green before committing an item.
# "{path}" is replaced with the narrowest sensible target the agent picks.
LHTASK_TEST_CMD="echo 'no test command configured' && false"

# Project constitution files, read first by every stage (in this order).
LHTASK_CONSTITUTION_FILES="AGENTS.md"

# Branch the IMPLEMENT stage commits to (isolated worktree, never auto-merged).
LHTASK_IMPL_BRANCH="autoplan/impl"

# Virtualenv to symlink into the impl worktree so tests run against worktree code.
# Set for Python projects (e.g. ".venv"); leave EMPTY for Node/Go/others.
LHTASK_VENV=""

# Code graph integration: auto | on | off. "auto" uses codegraph if on PATH.
LHTASK_CODEGRAPH="auto"

# Model override for headless runs (empty = account default; e.g. "opus").
LHTASK_MODEL=""

# Review the autonomous impl/ commits too (1 = yes). Closes the gap where the
# post-commit hook skips agent commits (AUTOPLAN_AGENT=1) and never reviews them.
LHTASK_REVIEW_AUTONOMOUS="1"

# Desktop notification on review completion if a notifier is present (1 = yes).
LHTASK_NOTIFY="0"
