# lhtask.conf — the single config for the LHTask autonomous TODO workflow.
# Sourced by the git-hook chain (plain shell, no jq needed). Edit freely; the
# bootstrap autodetects sensible defaults for your project type.

# Directories whose changes trigger the REVIEW stage (space-separated, regex-safe).
LHTASK_REVIEW_DIRS="src tests"

# Test command the IMPLEMENT stage must run green before committing an item.
# "{path}" is replaced with the narrowest sensible target the agent picks.
LHTASK_TEST_CMD="echo 'no test command configured' && false"

# Project constitution files, read first by every stage (in this order).
LHTASK_CONSTITUTION_FILES="AGENTS.md"

# Branch the IMPLEMENT stage commits to (isolated worktree, never auto-merged).
LHTASK_IMPL_BRANCH="autoplan/impl"

# Virtualenv to symlink into the impl worktree so tests run against worktree code.
# Set for Python projects (e.g. ".venv"); leave EMPTY for Node/Go/others.
LHTASK_VENV=""

# Code graph integration: auto | on | off. "auto" uses codegraph if on PATH.
LHTASK_CODEGRAPH="auto"

# Model override for headless runs (empty = account default; e.g. "opus").
LHTASK_MODEL=""

# Review the autonomous impl/ commits too (1 = yes). Closes the gap where the
# post-commit hook skips agent commits (AUTOPLAN_AGENT=1) and never reviews them.
LHTASK_REVIEW_AUTONOMOUS="1"

# Desktop notification on review completion if a notifier is present (1 = yes).
LHTASK_NOTIFY="0"

# ============================================================================
# Subagent-team + deterministic-gate (the implement stage runs a planner →
# navigator → implementer → GATE → reviewer loop; see .githooks/README.md).
# ============================================================================

# Project stack for the deterministic gate. "auto" detects from marker files
# (next.config*, package.json, pyproject.toml, composer.json, go.mod, Cargo.toml).
LHTASK_STACK="auto"

# Per-check gate commands. Each is binary: exit 0 = pass, non-zero = fail. A missing
# tool (first token not on PATH) is SKIPPED, never a hard fail. "{path}" is replaced
# with the narrowest sensible target. Leave empty to use the built-in stack default;
# LHTASK_GATE_TEST falls back to the legacy LHTASK_TEST_CMD when empty.
LHTASK_GATE_LINT=""
LHTASK_GATE_TYPECHECK=""
LHTASK_GATE_TEST=""
LHTASK_GATE_BUILD=""

# Fallow static analysis (https://docs.fallow.tools): dead code, duplication,
# complexity. Runs as a FIFTH gate check, scoped to the changed files of the item
# commit, gated "new-only" — only findings INTRODUCED by the change can fail.
# "auto" = run if fallow is installed (on PATH or ./node_modules/.bin); "off" = never.
# A fallow runtime/config error is recorded as skip, never a hard fail.
LHTASK_FALLOW="auto"

# Override the full fallow command ("{base}" is replaced with the base git ref).
# Empty = built-in default: fallow audit --base {base} --gate new-only --format json --quiet
# Licensed runtime layer: after `fallow license` + `fallow coverage setup`, point it
# at your Istanbul data, e.g.:
#   LHTASK_FALLOW_CMD="fallow audit --base {base} --format json --quiet --coverage coverage/coverage-final.json"
LHTASK_FALLOW_CMD=""

# Bounded implement↔gate↔review loop: max iterations before an item is escalated
# to "## 🚧 Deferred" / "## 🔎 Review-Findings" (convergence guarantee).
LHTASK_MAX_ITER="3"

# Per-phase timeout (seconds) for each headless `claude -p` call. Also bounds how
# long the implement lock can be held by a single (now longer-lived) run.
LHTASK_PHASE_TIMEOUT="600"

# --- Stage 2 (visual reviewer; scaffolded, not yet wired) ---
LHTASK_VISUAL_MAX_DIFF_RATIO="0.02"
LHTASK_DEV_URL="http://localhost:3000"
